<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="WC2026">
<meta name="theme-color" content="#07101f">
<title>WC 2026 Predictor</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07101f;
  --bg2: #0c1829;
  --card: #111e30;
  --card2: #172539;
  --border: #1c2e47;
  --gold: #f5c518;
  --gold-dim: #b8940f;
  --sky: #38bdf8;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --text: #e2eaf5;
  --muted: #5a7a9c;
  --tab-h: 60px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow-x:hidden; }
body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding-bottom:calc(var(--tab-h) + env(safe-area-inset-bottom, 0px));
  font-size:15px;
}

/* ── LOADER ─────────────────────────────────────── */
#loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; z-index:1000;
}
#loader h1 { font-family:'Bebas Neue',sans-serif; font-size:2.4em; letter-spacing:.06em; }
#loader h1 span { color:var(--gold); }
#loader p { color:var(--muted); font-size:.85em; }
.loader-ring {
  width:40px; height:40px;
  border:3px solid var(--border);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
#loader-status { font-family:'JetBrains Mono',monospace; font-size:.75em; color:var(--gold); }

/* ── SETUP ─────────────────────────────────────── */
#setup {
  position:fixed; inset:0; background:var(--bg);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  padding:28px; z-index:999;
}
#setup.show { display:flex; }
.setup-icon { font-size:3.2em; margin-bottom:10px; }
#setup h2 { font-family:'Bebas Neue',sans-serif; font-size:1.9em; letter-spacing:.05em; margin-bottom:6px; }
#setup h2 span { color:var(--gold); }
#setup p { color:var(--muted); font-size:.85em; line-height:1.6; text-align:center; margin-bottom:24px; max-width:320px; }
.setup-input {
  width:100%; background:var(--card);
  border:1px solid var(--border); border-radius:10px;
  color:var(--text); padding:13px 16px;
  font-family:'JetBrains Mono',monospace; font-size:.85em;
  outline:none; margin-bottom:10px; transition:border-color .2s;
}
.setup-input:focus { border-color:var(--gold); }
.setup-btn {
  width:100%; background:var(--gold); color:#07101f;
  border:none; border-radius:10px; padding:14px;
  font-family:'Bebas Neue',sans-serif; font-size:1.1em;
  letter-spacing:.12em; cursor:pointer;
  transition:opacity .15s;
}
.setup-btn:active { opacity:.8; }
.setup-link { color:var(--sky); font-size:.75em; margin-top:14px; }

/* ── HEADER ─────────────────────────────────────── */
.header {
  background:linear-gradient(180deg,#0b1930 0%,var(--bg) 100%);
  padding:14px 18px 12px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.header-title { font-family:'Bebas Neue',sans-serif; font-size:1.45em; letter-spacing:.05em; }
.header-title span { color:var(--gold); }
.header-right { display:flex; align-items:center; gap:8px; }
.live-pill {
  display:flex; align-items:center; gap:5px;
  font-size:.68em; color:var(--muted);
  background:rgba(34,197,94,.08);
  border:1px solid rgba(34,197,94,.15);
  border-radius:20px; padding:3px 9px;
}
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
.refresh-icon {
  background:none; border:1px solid var(--border);
  border-radius:8px; color:var(--muted);
  padding:6px; cursor:pointer; display:flex;
  align-items:center; transition:border-color .2s;
}
.refresh-icon:active { border-color:var(--gold); }

/* ── TABS ─────────────────────────────────────── */
.tab-bar {
  position:fixed; bottom:0; left:0; right:0;
  height:var(--tab-h); background:var(--card);
  border-top:1px solid var(--border);
  display:flex; z-index:200;
  padding-bottom:env(safe-area-inset-bottom, 0px);
}
.tab {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:3px; background:none; border:none;
  color:var(--muted); font-family:'DM Sans',sans-serif;
  font-size:9px; font-weight:500;
  letter-spacing:.04em; text-transform:uppercase;
  cursor:pointer; transition:color .2s; padding-bottom:2px;
}
.tab.on { color:var(--gold); }
.tab svg { width:19px; height:19px; }

/* ── PAGES ─────────────────────────────────────── */
.page { display:none; padding:16px; animation:fadeUp .2s ease; }
.page.on { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

/* ── CARDS ─────────────────────────────────────── */
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:12px; }
.card-h { font-family:'Bebas Neue',sans-serif; font-size:.9em; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }

/* ── CHAMPION BANNER ────────────────────────────── */
.champ-banner {
  background:linear-gradient(135deg,#0f2010,#091c10,var(--card));
  border:1px solid rgba(245,197,24,.2);
  border-radius:14px; padding:20px 16px;
  text-align:center; margin-bottom:12px;
  position:relative; overflow:hidden;
}
.champ-banner::after {
  content:'★'; position:absolute;
  font-size:90px; opacity:.04;
  right:-10px; top:-15px;
}
.champ-label { font-size:.68em; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.champ-flag { font-size:2em; margin-bottom:3px; display:block; }
.champ-name { font-family:'Bebas Neue',sans-serif; font-size:2.3em; letter-spacing:.04em; line-height:1; }
.champ-prob { font-family:'JetBrains Mono',monospace; font-size:.88em; color:var(--gold); margin-top:5px; }

/* ── PROB BARS ─────────────────────────────────── */
.prob-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.prob-name { font-size:.8em; flex-shrink:0; width:96px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.prob-track { flex:1; background:var(--bg2); border-radius:4px; height:7px; overflow:hidden; }
.prob-fill { height:100%; border-radius:4px; transition:width 1.2s cubic-bezier(.25,.8,.25,1); }
.prob-pct { font-family:'JetBrains Mono',monospace; font-size:.75em; color:var(--muted); width:38px; text-align:right; flex-shrink:0; }

/* ── GROUP CARDS ────────────────────────────────── */
.group-block { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:14px; overflow:hidden; }
.group-hdr { background:linear-gradient(90deg,var(--card2),var(--card)); padding:9px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.group-letter { font-family:'Bebas Neue',sans-serif; font-size:1.05em; letter-spacing:.1em; }
.group-letter em { color:var(--gold); font-style:normal; }
.g-sub { font-size:.68em; color:var(--muted); }
.st-table { width:100%; font-size:.78em; border-collapse:collapse; }
.st-table th { padding:6px 10px 5px; text-align:center; color:var(--muted); font-weight:500; font-size:.88em; border-bottom:1px solid var(--border); }
.st-table th:first-child { text-align:left; padding-left:14px; }
.st-table td { padding:7px 10px; text-align:center; border-bottom:1px solid rgba(28,46,71,.7); }
.st-table td:first-child { text-align:left; padding-left:14px; }
.st-table tr:last-child td { border-bottom:none; }
.qual-row td { background:rgba(34,197,94,.05); }
.third-row td { background:rgba(56,189,248,.04); }
.t-cell { display:flex; align-items:center; gap:6px; }
.t-flag { font-size:1.1em; }
.t-inj { font-size:.65em; padding:1px 5px; border-radius:3px; background:rgba(245,158,11,.2); color:var(--amber); font-weight:700; }
.pct-val { font-family:'JetBrains Mono',monospace; font-size:.85em; }
.pct-hi { color:var(--green); }
.pct-mid { color:var(--amber); }
.pct-lo { color:var(--red); }

/* ── MATCH CHIPS ─────────────────────────────────── */
.match-list { padding:6px 6px 4px; }
.match-chip { background:var(--bg2); border-radius:8px; padding:9px 11px; margin-bottom:5px; }
.match-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.m-team { flex:1; text-align:center; font-size:.78em; }
.m-flag { font-size:1.15em; display:block; margin-bottom:1px; }
.m-name { display:block; color:var(--text); font-size:.95em; }
.m-vs { font-size:.68em; color:var(--muted); flex-shrink:0; }
.m-score { font-family:'JetBrains Mono',monospace; font-size:1em; font-weight:600; color:var(--gold); flex-shrink:0; }
.m-date { font-size:.65em; color:var(--muted); flex-shrink:0; }
.m-probs { display:flex; gap:5px; font-family:'JetBrains Mono',monospace; font-size:.67em; }
.mp-w { color:var(--green); }
.mp-d { color:var(--muted); }
.mp-l { color:var(--red); }

/* ── BRACKET ─────────────────────────────────────── */
.round-block { margin-bottom:22px; }
.round-label { font-family:'Bebas Neue',sans-serif; font-size:1em; letter-spacing:.12em; color:var(--gold); margin-bottom:9px; padding:0 1px; }
.bk-match { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:11px 13px; margin-bottom:8px; }
.bk-team { display:flex; align-items:center; justify-content:space-between; padding:4px 0; font-size:.85em; }
.bk-team + .bk-team { border-top:1px solid var(--border); }
.bk-left { display:flex; align-items:center; gap:7px; }
.bk-pct { font-family:'JetBrains Mono',monospace; font-size:.75em; color:var(--muted); }
.bk-winner { color:var(--gold); font-weight:600; }
.bk-winner .bk-pct { color:var(--gold-dim); }
.final-match { border-color:rgba(245,197,24,.35); background:linear-gradient(135deg,#141e0b,var(--card)); }

/* ── ODDS ─────────────────────────────────────── */
.odds-hdr { display:flex; padding:7px 13px; background:var(--card2); font-size:.68em; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); }
.odds-row { display:flex; align-items:center; padding:9px 13px; border-bottom:1px solid rgba(28,46,71,.6); gap:6px; font-size:.78em; }
.odds-row:last-child { border-bottom:none; }
.odds-matchup { flex:1; }
.odds-matchup strong { display:block; font-size:.9em; color:var(--text); }
.odds-matchup span { color:var(--muted); font-size:.8em; }
.o-num { font-family:'JetBrains Mono',monospace; font-size:.83em; width:44px; text-align:right; flex-shrink:0; }
.o-model { color:var(--sky); }
.o-market { color:var(--muted); }
.d-pos { color:var(--green); font-weight:600; }
.d-neg { color:var(--red); font-weight:600; }
.d-flat { color:var(--muted); }

/* ── ACCURACY ─────────────────────────────────── */
.metrics-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.m-tile { background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:13px 10px; text-align:center; }
.m-lbl { font-size:.66em; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.m-big { font-family:'Bebas Neue',sans-serif; font-size:1.9em; line-height:1; margin-bottom:3px; }
.m-sub { font-size:.66em; color:var(--muted); }
.c-green { color:var(--green); }
.c-amber { color:var(--amber); }
.c-red { color:var(--red); }
.c-sky { color:var(--sky); }

/* ── UTIL ─────────────────────────────────────── */
.sec-label { font-size:.68em; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:14px 0 7px; padding:0 1px; display:block; }
.badge { display:inline-block; font-size:.67em; padding:2px 6px; border-radius:3px; font-weight:700; letter-spacing:.04em; }
.b-out { background:rgba(239,68,68,.18); color:var(--red); }
.b-doubt { background:rgba(245,158,11,.18); color:var(--amber); }
.injury-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid rgba(28,46,71,.6); font-size:.82em; }
.injury-row:last-child { border-bottom:none; }
.inj-left { display:flex; align-items:center; gap:7px; }
.inj-right { display:flex; align-items:center; gap:6px; }
.inj-team { font-size:.8em; color:var(--muted); }
.page-title { font-family:'Bebas Neue',sans-serif; font-size:1.5em; letter-spacing:.05em; margin-bottom:14px; }
.page-title span { color:var(--gold); }
.last-up { font-size:.68em; color:var(--muted); text-align:center; padding:6px 0 10px; }
.empty-state { text-align:center; padding:32px 16px; color:var(--muted); font-size:.85em; line-height:1.7; }
.big-btn { width:100%; background:none; border:1px solid var(--border); border-radius:10px; color:var(--muted); padding:13px; font-family:'DM Sans',sans-serif; font-size:.85em; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:border-color .2s; }
.big-btn:active { border-color:var(--gold); color:var(--gold); }
.model-info div { padding:4px 0; font-size:.82em; color:var(--muted); border-bottom:1px solid rgba(28,46,71,.5); }
.model-info div:last-child { border-bottom:none; }
.model-info strong { color:var(--text); }
.error-box { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); border-radius:10px; padding:12px 14px; font-size:.8em; color:#fca5a5; margin-bottom:10px; text-align:center; }
.highlight-top { background:linear-gradient(90deg,rgba(245,197,24,.06),transparent); }
</style>
</head>
